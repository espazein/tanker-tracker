# Rate-limit zones for tanker-tracker.
# Installed to /etc/nginx/conf.d/ so it's loaded in the http{} context
# (limit_req_zone and limit_conn_zone can only be declared at http level).

# 30 requests/second sustained, per client IP, with shared 10 MB tracking table.
limit_req_zone  $binary_remote_addr zone=tt_req:10m  rate=30r/s;

# Up to 20 concurrent connections per client IP.
limit_conn_zone $binary_remote_addr zone=tt_conn:10m;
