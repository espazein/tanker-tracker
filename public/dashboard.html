<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanker Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="dashboard-page">

  <header class="dash-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon header-icon-svg">
          <svg viewBox="0 0 64 40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="34" height="16" rx="8"/>
            <path d="M37 14h9l8 8v5H37z"/>
            <line x1="20" y1="11" x2="20" y2="27"/>
            <circle cx="16" cy="31" r="4"/><circle cx="48" cy="31" r="4"/>
            <path d="M28 6c2 2.5 3 4 3 5.2a3 3 0 0 1-6 0C25 10 26 8.5 28 6z" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div>
          <h1>Water Tanker Dashboard</h1>
          <p id="society-subtitle">Society Water Management</p>
        </div>
      </div>
      <a href="/guard" class="btn btn-outline btn-sm guard-link">Guard Portal →</a>
    </div>
  </header>

  <main class="dash-main">

    <!-- Stats row -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="8" y1="2" x2="8" y2="5"/><line x1="16" y1="2" x2="16" y2="5"/>
            <circle cx="12" cy="15" r="2" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="stat-value" id="stat-today">—</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="8" y1="2" x2="8" y2="5"/><line x1="16" y1="2" x2="16" y2="5"/>
            <line x1="7" y1="15" x2="17" y2="15" stroke-width="2.5"/>
          </svg>
        </div>
        <div class="stat-value" id="stat-week">—</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="8" y1="2" x2="8" y2="5"/><line x1="16" y1="2" x2="16" y2="5"/>
            <circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/>
            <circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="stat-value" id="stat-month">—</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M5 4H3v2a3 3 0 0 0 3 3"/><path d="M19 4h2v2a3 3 0 0 1-3 3"/>
            <line x1="12" y1="14" x2="12" y2="18"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="10" y1="21" x2="14" y2="18"/>
          </svg>
        </div>
        <div class="stat-value" id="stat-alltime">—</div>
        <div class="stat-label">All Time</div>
      </div>
    </section>

    <!-- Two column -->
    <div class="dash-grid">

      <!-- Vendor breakdown -->
      <section class="card">
        <h2 class="card-title">Today's Vendors</h2>
        <div id="vendor-list">
          <div class="empty-state">No deliveries today yet</div>
        </div>
      </section>

      <!-- Weekly trend -->
      <section class="card">
        <h2 class="card-title">7-Day Trend</h2>
        <div id="trend-chart" class="trend-chart"></div>
      </section>

    </div>

    <!-- Deliveries (filterable) -->
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Deliveries</h2>
        <span id="last-updated" class="last-updated"></span>
      </div>

      <div class="filter-bar">
        <button class="filter-chip" data-range="today">Today</button>
        <button class="filter-chip active" data-range="week">This Week</button>
        <button class="filter-chip" data-range="month">This Month</button>
        <button class="filter-chip" data-range="custom">Custom</button>
      </div>

      <div id="custom-range" class="custom-range hidden">
        <label>From <input type="date" id="range-from"></label>
        <label>To <input type="date" id="range-to"></label>
        <button id="btn-apply-range" class="btn btn-primary btn-sm">Apply</button>
      </div>

      <div id="filter-summary" class="filter-summary"></div>
      <div id="filter-vendors" class="filter-vendors"></div>

      <div id="entries-list" class="entries-list">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

  </main>

  <!-- Photo lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-bg"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lb-close">✕</button>
      <img id="lb-img" src="" alt="Tanker photo">
      <div id="lb-meta" class="lb-meta"></div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
